name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke test
        run: python scripts/ci_smoke_test.py

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build executable
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiBooks-windows-exe
          path: dist/LiBooks.exe
          retention-days: 7

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build app bundle
        env:
          LIBOOKS_PYTHON: python
        run: bash scripts/build_macos.sh

      - name: Create ZIP
        run: ditto -c -k --keepParent dist/LiBooks.app dist/LiBooks-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiBooks-macos-app
          path: dist/LiBooks-macOS.zip
          retention-days: 7