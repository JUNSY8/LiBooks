name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        env:
          LIBOOKS_SIGN_PFX_B64: ${{ secrets.LIBOOKS_SIGN_PFX }}
          LIBOOKS_SIGN_PASSWORD: ${{ secrets.LIBOOKS_SIGN_PASSWORD }}
        run: |
          $canSign = $env:LIBOOKS_SIGN_PFX_B64 -and $env:LIBOOKS_SIGN_PASSWORD
          if ($canSign) {
            try {
              [Convert]::FromBase64String($env:LIBOOKS_SIGN_PFX_B64) | Out-Null
            } catch {
              Write-Error "LIBOOKS_SIGN_PFX no es Base64 válido: $_"
              exit 1
            }
            Write-Host "Building signed Windows installer..."
            $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:LIBOOKS_SIGN_PFX_B64))
            $env:LIBOOKS_SIGN_PFX = $pfxPath
            .\scripts\build_installer.ps1 -RequireSign
          } else {
            Write-Host "::warning::Building UNSIGNED Windows installer (signing secrets not configured)."
            Write-Host "Users may see SmartScreen warnings until a production certificate is added."
            .\scripts\build_installer.ps1 -SkipSign
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiBooks-windows
          path: dist/LiBooks-Setup-*.exe
          retention-days: 30

  build-linux:
    name: Linux app (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libfontconfig1 \
            libdbus-1-3

      - name: Build executable
        env:
          LIBOOKS_PYTHON: python
        run: bash scripts/build_linux.sh

      - name: Create archive
        run: |
          VERSION=$(python -c "from version import APP_VERSION; print(APP_VERSION)")
          tar -czf "dist/LiBooks-${VERSION}-Linux-x86_64.tar.gz" -C dist LiBooks

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiBooks-linux
          path: dist/LiBooks-*-Linux-x86_64.tar.gz
          retention-days: 30

  publish:
    name: Publish release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LiBooks-windows
          path: release-assets/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: LiBooks-linux
          path: release-assets/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/*
            release-assets/linux/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
